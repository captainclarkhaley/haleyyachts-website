<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Kuula Contact Card - Clark Haley</title>

<link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
        background: #0a1628;
        font-family: 'Open Sans', Arial, sans-serif;
        color: #fff;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
    }
    body {
        display: flex;
        align-items: flex-start;
        justify-content: flex-start;
        min-height: 100vh;
    }

    .card {
        width: 1200px;
        height: 600px;
        display: flex;
        flex-direction: column;
        background: linear-gradient(135deg, #0a1628 0%, #15263f 60%, #1b3252 100%);
        overflow: hidden;
        position: relative;
        box-shadow: 0 8px 40px rgba(0,0,0,0.45);
    }

    /* Top row holds the photo + info side by side */
    .top-row {
        display: flex;
        width: 1200px;
        height: 504px;
        position: relative;
    }

    /* Subtle accent stripe down the seam between photo and info */
    .top-row::after {
        content: "";
        position: absolute;
        top: 0;
        bottom: 0;
        left: 600px;
        width: 2px;
        background: linear-gradient(180deg, transparent 0%, #21cbea 30%, #21cbea 70%, transparent 100%);
        opacity: 0.55;
    }

    /* LEFT - photo panel */
    .photo-panel {
        width: 600px;
        height: 504px;
        position: relative;
        overflow: hidden;
        background: #1a2942;
        flex-shrink: 0;
    }
    .photo-panel img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        object-position: center 18%;
        display: block;
    }
    /* Soft right-edge fade so photo melts into the dark panel */
    .photo-panel::after {
        content: "";
        position: absolute;
        top: 0;
        right: 0;
        bottom: 0;
        width: 120px;
        background: linear-gradient(90deg, rgba(10,22,40,0) 0%, rgba(10,22,40,0.55) 100%);
        pointer-events: none;
    }

    /* RIGHT - info panel */
    .info-panel {
        width: 600px;
        height: 504px;
        padding: 56px 56px;
        display: flex;
        flex-direction: column;
        justify-content: center;
        gap: 18px;
        position: relative;
    }

    /* Full-width logo footer */
    .logo-bar {
        width: 1200px;
        height: 96px;
        background: #ffffff;
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0 40px;
        flex-shrink: 0;
        border-top: 1px solid rgba(33, 203, 234, 0.35);
    }
    .logo-bar .haley-logo {
        height: 60px;
        width: auto;
        display: block;
    }
    .logo-bar .owyg-logo {
        height: 48px;
        width: auto;
        display: block;
    }

    .name {
        font-size: 44px;
        font-weight: 300;
        letter-spacing: 0.5px;
        line-height: 1.05;
        color: #ffffff;
        white-space: nowrap;
    }

    .company {
        font-size: 22px;
        font-weight: 400;
        letter-spacing: 0.5px;
        color: #cfd8e3;
        white-space: nowrap;
    }

    .contact-row {
        display: flex;
        align-items: center;
        gap: 14px;
        font-size: 22px;
        font-weight: 400;
        color: #ffffff;
        letter-spacing: 0.3px;
        white-space: nowrap;
    }

    .icon {
        width: 34px;
        height: 34px;
        border-radius: 50%;
        background: rgba(33, 203, 234, 0.14);
        border: 1px solid rgba(33, 203, 234, 0.55);
        display: inline-flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
    }
    .icon svg {
        width: 16px;
        height: 16px;
        stroke: #21cbea;
        fill: none;
        stroke-width: 2;
        stroke-linecap: round;
        stroke-linejoin: round;
    }

</style>
</head>
<body>
    <div class="card">
        <div class="top-row">
            <div class="photo-panel">
                <img src="../images/people/clark-haley-headshot.jpg" alt="Clark Haley">
            </div>
            <div class="info-panel">
                <div class="name">Clark Haley</div>
                <div class="company">One Water Yacht Group</div>

                <div class="contact-row">
                    <span class="icon">
                        <svg viewBox="0 0 24 24"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/></svg>
                    </span>
                    <span>+1 561.817.1547</span>
                </div>

                <div class="contact-row">
                    <span class="icon">
                        <svg viewBox="0 0 24 24"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>

                    <span>clarkh@OWYG.com</span>
                </div>
            </div>
        </div>
        <div class="logo-bar">
            <img class="haley-logo" src="../images/brand/haleyyachtslogo.png" alt="Haley Yachts">
            <img class="owyg-logo" src="../images/email/owyg-banner.jpg" alt="One Water Yacht Group">
        </div>
    </div>
</body>
</html>
