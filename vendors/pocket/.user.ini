; ============================================================
; Pocket Listings - raise PHP upload limits for image uploads.
; ------------------------------------------------------------
; A New Listing can carry a hero image plus up to 4 more, and phone photos are
; several MB each, which exceeds cPanel's default PHP limits (often 2M). Those
; defaults make PHP drop the entire form, so a commit silently fails.
;
; This .user.ini is honored on PHP-FPM / CGI (the cPanel default). If uploads
; still fail after deploy, set the SAME values in cPanel > MultiPHP INI Editor
; for haleyyachts.com (that path always works).
;
; upload_max_filesize sits just above the app's own 12M per-image cap, so a file
; between 12M and 16M reaches PHP and gets a clean in-app "too large" message
; instead of being dropped at the transport layer.
; ============================================================
upload_max_filesize = 16M
post_max_size = 64M
memory_limit = 256M
max_file_uploads = 20
