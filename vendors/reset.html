<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="robots" content="noindex, nofollow">
    <!--
        Redirect shim. The password-reset page moved to reset.php (config-driven
        / white-label). Kept ONLY so any reset email sent BEFORE the rename still
        works: it forwards to reset.php while PRESERVING the ?token= query string
        that the reset flow needs. Nothing new should link here.
    -->
    <title>Redirecting...</title>
    <script>
        // Preserve the full query string (?token=...) when forwarding.
        window.location.replace('reset.php' + window.location.search);
    </script>
</head>
<body>
    <p>This page has moved. <a href="reset.php">Continue to reset your password</a>.</p>
</body>
</html>
