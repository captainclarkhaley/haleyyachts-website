<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Concept A: Interlocking H and Y — the right leg of H becomes the left arm of Y -->

  <!-- H — left side in dark -->
  <rect x="28" y="30" width="18" height="140" rx="2" fill="#333"/>
  <rect x="28" y="88" width="62" height="18" rx="2" fill="#333"/>

  <!-- Y — right side in cyan, sharing the crossbar zone -->
  <!-- Left arm of Y -->
  <polygon points="90,30 108,30 90,88 72,88" fill="#21cbea"/>
  <!-- Right arm of Y -->
  <polygon points="132,30 152,30 118,88 100,88" fill="#21cbea"/>
  <!-- Y stem -->
  <rect x="100" y="88" width="18" height="82" rx="2" fill="#21cbea"/>
</svg>