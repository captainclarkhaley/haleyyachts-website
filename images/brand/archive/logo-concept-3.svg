<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 80" width="420" height="80">
  <!-- Concept 3: Geometric angular yacht bow + wordmark -->

  <!-- Yacht bow — sharp geometric lines -->
  <g transform="translate(6, 6)">
    <!-- Hull — angular, modern -->
    <path d="M0 58 L28 58 L36 40 L28 40Z" fill="#21cbea"/>
    <!-- Superstructure -->
    <rect x="28" y="32" width="20" height="8" rx="1" fill="#333" opacity="0.2"/>
    <!-- Windshield -->
    <path d="M48 32 L56 20 L56 32Z" fill="#21cbea" opacity="0.5"/>
    <!-- Flybridge line -->
    <path d="M30 32 L56 20" stroke="#333" stroke-width="1.5" stroke-linecap="round"/>
    <!-- Tower/antenna -->
    <line x1="44" y1="10" x2="44" y2="20" stroke="#333" stroke-width="1.2" stroke-linecap="round"/>
    <!-- Wake lines -->
    <line x1="0" y1="62" x2="24" y2="62" stroke="#21cbea" stroke-width="1" opacity="0.5"/>
    <line x1="4" y1="66" x2="18" y2="66" stroke="#21cbea" stroke-width="1" opacity="0.3"/>
  </g>

  <!-- Wordmark — horizontal, bold/light contrast -->
  <text x="78" y="44" font-family="'Open Sans', Arial, sans-serif" font-size="30" font-weight="700" letter-spacing="2" fill="#333">HALEY</text>
  <text x="78" y="64" font-family="'Open Sans', Arial, sans-serif" font-size="12" font-weight="600" letter-spacing="10" fill="#999">Y A C H T S</text>

  <!-- Vertical accent bar between icon and text -->
  <line x1="70" y1="16" x2="70" y2="68" stroke="#21cbea" stroke-width="2"/>
</svg>