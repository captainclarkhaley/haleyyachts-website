<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Concept C: Bold geometric split — H left half dark, Y right half cyan,
       sharing a center vertical axis to create one unified mark -->

  <!-- Background square with rounded corners -->
  <rect x="10" y="10" width="180" height="180" rx="16" fill="#333"/>

  <!-- H — left portion, white/light on dark background -->
  <!-- Left vertical -->
  <rect x="32" y="42" width="16" height="116" rx="2" fill="#ffffff"/>
  <!-- Crossbar (extends to center) -->
  <rect x="32" y="90" width="56" height="16" rx="2" fill="#ffffff"/>
  <!-- Right vertical of H (shared center axis) -->
  <rect x="72" y="42" width="16" height="116" rx="2" fill="#ffffff"/>

  <!-- Y — right portion in cyan -->
  <!-- Left arm of Y (from center) -->
  <polygon points="100,42 116,42 108,80 100,80" fill="#21cbea"/>
  <!-- Right arm of Y -->
  <polygon points="144,42 160,42 116,80 108,80" fill="#21cbea"/>
  <!-- Stem of Y -->
  <rect x="104" y="80" width="16" height="78" rx="2" fill="#21cbea"/>

  <!-- Thin divider line at center -->
  <line x1="92" y1="36" x2="92" y2="164" stroke="#21cbea" stroke-width="1.5" opacity="0.4"/>
</svg>