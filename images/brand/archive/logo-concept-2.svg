<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 80" width="400" height="80">
  <!-- Concept 2: Abstract wave mark + wordmark -->

  <!-- Wave / compass icon -->
  <g transform="translate(8, 10)">
    <!-- Circular frame — thin -->
    <circle cx="30" cy="30" r="28" fill="none" stroke="#21cbea" stroke-width="2"/>

    <!-- Stylized wave inside circle -->
    <path d="M8 34 Q16 24 24 34 Q32 44 40 34 Q48 24 52 30"
          fill="none" stroke="#21cbea" stroke-width="2.5" stroke-linecap="round"/>

    <!-- Compass north pointer -->
    <polygon points="30,6 27,18 30,15 33,18" fill="#333" opacity="0.7"/>

    <!-- Small horizon line -->
    <line x1="12" y1="26" x2="48" y2="26" stroke="#333" stroke-width="0.8" opacity="0.3"/>
  </g>

  <!-- Wordmark — spaced elegantly -->
  <text x="80" y="33" font-family="'Open Sans', Arial, sans-serif" font-size="24" font-weight="700" letter-spacing="4" fill="#333">HALEY</text>
  <text x="80" y="56" font-family="'Open Sans', Arial, sans-serif" font-size="14" font-weight="400" letter-spacing="8" fill="#21cbea">YACHTS</text>
</svg>