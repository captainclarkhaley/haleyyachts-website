<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 80" width="400" height="80">
  <!-- Concept 1: Sleek hull silhouette + clean wordmark -->

  <!-- Hull icon — minimal yacht profile -->
  <g transform="translate(0, 12)">
    <!-- Hull body -->
    <path d="M5 38 Q8 52 20 52 L55 52 Q62 52 65 44 L70 32 Q71 28 68 28 L12 28 Q8 28 5 38Z"
          fill="#21cbea" opacity="0.9"/>
    <!-- Mast -->
    <line x1="38" y1="6" x2="38" y2="28" stroke="#333" stroke-width="2" stroke-linecap="round"/>
    <!-- Sail — single clean triangle -->
    <path d="M40 8 L58 26 L40 26Z" fill="#333" opacity="0.15"/>
    <!-- Bowsprit line -->
    <line x1="62" y1="30" x2="72" y2="22" stroke="#333" stroke-width="1.5" stroke-linecap="round"/>
  </g>

  <!-- Wordmark -->
  <text x="88" y="42" font-family="'Open Sans', Arial, sans-serif" font-size="28" font-weight="700" letter-spacing="3" fill="#333">HALEY</text>
  <text x="232" y="42" font-family="'Open Sans', Arial, sans-serif" font-size="28" font-weight="300" letter-spacing="3" fill="#333">YACHTS</text>

  <!-- Accent line -->
  <line x1="88" y1="52" x2="340" y2="52" stroke="#21cbea" stroke-width="2"/>
</svg>