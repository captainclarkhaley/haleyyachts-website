<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 260 260" width="260" height="260">
  <!-- Concept F — DARK BACKGROUND variant: Rose and H in near-white, Y in cyan -->

  <!-- Outer circle -->
  <circle cx="130" cy="130" r="120" fill="none" stroke="#f5f5f5" stroke-width="3.5"/>

  <!-- Inner cyan ring -->
  <circle cx="130" cy="130" r="112" fill="none" stroke="#21cbea" stroke-width="1.5"/>

  <!-- Cardinal tick marks -->
  <line x1="130" y1="10" x2="130" y2="22" stroke="#f5f5f5" stroke-width="3.5"/>
  <line x1="130" y1="238" x2="130" y2="250" stroke="#f5f5f5" stroke-width="3"/>
  <line x1="238" y1="130" x2="250" y2="130" stroke="#f5f5f5" stroke-width="3"/>
  <line x1="10" y1="130" x2="22" y2="130" stroke="#f5f5f5" stroke-width="3"/>

  <!-- Intercardinal tick marks -->
  <line x1="209" y1="34" x2="217" y2="42" stroke="#f5f5f5" stroke-width="2" opacity="0.5"/>
  <line x1="43" y1="42" x2="51" y2="34" stroke="#f5f5f5" stroke-width="2" opacity="0.5"/>
  <line x1="217" y1="218" x2="209" y2="226" stroke="#f5f5f5" stroke-width="2" opacity="0.5"/>
  <line x1="51" y1="226" x2="43" y2="218" stroke="#f5f5f5" stroke-width="2" opacity="0.5"/>

  <!-- North arrow -->
  <polygon points="130,16 124,38 130,31 136,38" fill="#21cbea"/>

  <!-- H in near-white -->
  <text x="52" y="168" font-family="Georgia, 'Times New Roman', serif" font-size="132" font-weight="normal" fill="#f5f5f5">H</text>

  <!-- Y in cyan -->
  <text x="128" y="168" font-family="Georgia, 'Times New Roman', serif" font-size="132" font-weight="normal" fill="#21cbea">Y</text>
</svg>